name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  frontend:
    name: Frontend (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - name: npm audit (high+)
        run: npm audit --audit-level=high || true

  orchestrator:
    name: Orchestrateur (typecheck · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: orchestrator/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  hygiene:
    name: Hygiène dépôt (secrets · artefacts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Aucun .env (hors .example/.test) versionné
        run: |
          if git ls-files | grep -E '(^|/)\.env($|\.)' | grep -vE '\.env\.example$|\.env\.test$'; then
            echo "::error::Un fichier .env est versionné"; exit 1; fi
      - name: Aucun node_modules / dist versionné
        run: |
          if git ls-files | grep -E '(^|/)(node_modules|dist)/'; then
            echo "::error::Artefacts de build versionnés"; exit 1; fi
      - name: Aucune valeur secrète évidente
        run: |
          if git ls-files | grep -vE 'package-lock|\.env\.example' \
            | xargs grep -lEi 'eyJ[A-Za-z0-9_-]{30,}|postgres(ql)?://[a-z0-9_]+:[^@ ]+@|hooks\.slack\.com/services/T[A-Z0-9]+/B' 2>/dev/null; then
            echo "::error::Valeur secrète potentielle détectée"; exit 1; fi
